<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="search-section">
    <div class="search-box">
        🔍
        <input type="text" id="searchInput" placeholder="Search by event">
    </div>

    <div class="trending" id="trendingBox">
        <h4>Trending searches 🔥</h4>

        <div class="event">
            <div class="date">DEC<br><span>18</span></div>
            <img src="https://via.placeholder.com/120x70">
            <div class="info">
                <h3>Heritage India Tour</h3>
                <p>Shilpakala Vedika · 07:00 PM</p>
            </div>
        </div>

        <div class="event">
            <div class="date">DEC<br><span>21</span></div>
            <img src="https://via.placeholder.com/120x70">
            <div class="info">
                <h3>Akshay Srivastava</h3>
                <p>The Comedy Theatre · 05:30 PM</p>
            </div>
        </div>

    </div>
</div>

<script src="jk.js"></script>
</body>
</html>
